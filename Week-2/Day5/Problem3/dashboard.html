<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>College Event Dashboard</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
  <div class="container">
    <a class="navbar-brand">College Events</a>

    <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#menu">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="menu">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link active">Dashboard</a></li>
      </ul>
    </div>
  </div>
</nav>

<!-- MAIN CONTENT -->
<div class="container my-5">
  <div class="row g-4">

    <!-- LEFT: EVENT LIST -->
    <div class="col-lg-6">
      <h4>Event List</h4>
      <ul class="list-group" id="eventList">
        <li class="list-group-item">Tech Fest</li>
        <li class="list-group-item">Cultural Day</li>
        <li class="list-group-item">Ethnic Day</li>
      </ul>
    </div>

    <!-- RIGHT: FORM + BUTTON -->
    <div class="col-lg-6">

      <!-- ADD EVENT BUTTON -->
      <button class="btn btn-success mb-4" data-bs-toggle="modal" data-bs-target="#eventModal">
        Add Event
      </button>

      <!-- REGISTRATION FORM -->
      <h4>Register for Event</h4>
      <form id="registerForm">
        <input type="text" class="form-control mb-2" placeholder="Your Name" required>
        <input type="email" class="form-control mb-2" placeholder="Email" required>
        <button class="btn btn-primary w-100">Register</button>
      </form>

      <p id="successMsg" class="text-success mt-2"></p>

    </div>

  </div>
</div>

<!-- MODAL -->
<div class="modal fade" id="eventModal">
  <div class="modal-dialog">
    <div class="modal-content">

      <div class="modal-header">
        <h5>Add Event</h5>
        <button class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body">
        <form id="eventForm">
          <input type="text" id="eventName" class="form-control mb-3" placeholder="Event Name" required>
          <input type="date" class="form-control mb-3" required>
          <button class="btn btn-primary w-100">Save</button>
        </form>
      </div>

    </div>
  </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<!-- JAVASCRIPT -->
<script>

  // ADD EVENT FUNCTION
  document.getElementById("eventForm").addEventListener("submit", function(e) {
    e.preventDefault();

    let name = document.getElementById("eventName").value;

    let li = document.createElement("li");
    li.className = "list-group-item";
    li.innerText = name;

    document.getElementById("eventList").appendChild(li);

    this.reset();

    let modal = bootstrap.Modal.getInstance(document.getElementById('eventModal'));
    modal.hide();
  });


  // REGISTRATION FORM
  document.getElementById("registerForm").addEventListener("submit", function(e) {
    e.preventDefault();

    document.getElementById("successMsg").innerText = "Registered successfully!";

    this.reset();
  });

</script>

</body>
</html>
