<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ShopNow</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
/* Hero Section */
.hero {
  background: linear-gradient(45deg, #2b6cff, #7b2cff);
  color: white;
  text-align: center;
  padding: 80px 20px;
}

/* Carousel Images FIX */
.carousel-item img {
  height: 400px;
  width: 100%;
  object-fit: cover;
}

/* Product Card Images FIX */
.card img {
  height: 200px;
  object-fit: cover;
}

/* Button spacing */
.card .btn {
  margin: 5px;
}
</style>
</head>

<body>

<!-- Navbar -->
<nav class="navbar navbar-dark bg-dark">
  <div class="container-fluid">
    <a class="navbar-brand">ShopNow</a>

    <button class="navbar-toggler" data-bs-toggle="offcanvas" data-bs-target="#menu">
      <span class="navbar-toggler-icon"></span>
    </button>
  </div>
</nav>

<!-- Offcanvas Menu -->
<div class="offcanvas offcanvas-start" id="menu">
  <div class="offcanvas-header">
    <h5>Menu</h5>
    <button class="btn-close" data-bs-dismiss="offcanvas"></button>
  </div>
  <div class="offcanvas-body">
    <ul class="list-group">
      <li class="list-group-item">Home</li>
      <li class="list-group-item">Products</li>
      <li class="list-group-item">Contact</li>
    </ul>
  </div>
</div>

<!-- Hero Section -->
<div class="hero">
  <h1>Welcome to ShopNow</h1>
  <p>Your one-stop shop for all electronics</p>
  <button class="btn btn-light">Shop Now</button>
</div>

<!-- Carousel -->
<div id="carouselExample" class="carousel slide mt-4" data-bs-ride="carousel">
  <div class="carousel-inner">

    <div class="carousel-item active">
      <img src="assets/laptop.jpg" class="d-block w-100">
    </div>

    <div class="carousel-item">
      <img src="assets/iphone.jpg" class="d-block w-100">
    </div>

    <div class="carousel-item">
      <img src="assets/jewellery.jpg" class="d-block w-100">
    </div>

  </div>

  <!-- Controls -->
  <button class="carousel-control-prev" data-bs-target="#carouselExample" data-bs-slide="prev">
    <span class="carousel-control-prev-icon"></span>
  </button>

  <button class="carousel-control-next" data-bs-target="#carouselExample" data-bs-slide="next">
    <span class="carousel-control-next-icon"></span>
  </button>
</div>

<!-- Products -->
<div class="container my-5 text-center">
  <h2 class="mb-4">Featured Products</h2>

  <div class="row g-4">

    <!-- Product 1 -->
    <div class="col-md-4">
      <div class="card p-3">
        <img src="assets/laptop.jpg" class="card-img-top">
        <h5 class="mt-3">Laptop</h5>
        <div>
          <button class="btn btn-primary btn-sm">Add to Cart</button>
          <button class="btn btn-outline-secondary btn-sm">View Details</button>
        </div>
      </div>
    </div>

    <!-- Product 2 -->
    <div class="col-md-4">
      <div class="card p-3">
        <img src="assets/iphone.jpg" class="card-img-top">
        <h5 class="mt-3">Phone</h5>
        <div>
          <button class="btn btn-primary btn-sm">Add to Cart</button>
          <button class="btn btn-outline-secondary btn-sm">View Details</button>
        </div>
      </div>
    </div>

    <!-- Product 3 -->
    <div class="col-md-4">
      <div class="card p-3">
        <img src="assets/jewellery.jpg" class="card-img-top">
        <h5 class="mt-3">Jewellery</h5>
        <div>
          <button class="btn btn-primary btn-sm">Add to Cart</button>
          <button class="btn btn-outline-secondary btn-sm">View Details</button>
        </div>
      </div>
    </div>

  </div>
</div>

<!-- Newsletter -->
<div class="container text-center mb-5">
  <h3>Subscribe to Newsletter</h3>

  <form class="row justify-content-center">
    <div class="col-md-6">
      <input type="email" class="form-control mb-3" placeholder="Enter your email">
      <button class="btn btn-success w-100">Subscribe</button>
    </div>
  </form>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
