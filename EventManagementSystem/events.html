<!DOCTYPE html>
<html>
<head>
    <title>Events</title>
    <link rel="stylesheet" href="css/style.css">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body onload="checkLogin()">
<nav class="navbar navbar-expand-lg custom-navbar">
    <div class="container">
        <span class="navbar-brand text-white">upGrad</span>
        <div>
            <a href="index.html">Home</a>
            <a href="login.html">Login</a>
            <a href="events.html">Events</a>
            <a href="contact.html">Contact Us</a>
        </div>
    </div>
</nav>

<div class="container mt-4">

    <!-- Logout -->
<button onclick="logout()" class="btn btn-danger">Logout</button>    <h2 class="mb-4">Manage Events</h2>

    <!-- Add Event Form -->
    <div class="card p-4 mb-4">
        <h5>Add Event</h5>

        <input id="eventId" class="form-control mb-2" placeholder="Event ID" required>
        <input id="eventName" class="form-control mb-2" placeholder="Event Name" required>

        <select id="category" class="form-control mb-2">
            <option value="">Select Category</option>
            <option>Tech & Innovations</option>
            <option>Industrial Event</option>
        </select>

        <input type="date" id="date" class="form-control mb-2">
        <input type="time" id="time" class="form-control mb-2">
        <input type="url" id="url" class="form-control mb-2" placeholder="Event URL">

        <button class="btn btn-success" onclick="addEvent()">Add Event</button>
    </div>

    <!-- Search -->
    <div class="card p-3 mb-4">
        <h5>Search Event</h5>

        <input id="searchInput" class="form-control mb-2" placeholder="Search by ID / Name / Category">
        <button class="btn btn-primary" onclick="searchEvent()">Search</button>
    </div>

    <!-- Event List -->
    <div id="eventList" class="row"></div>

    <!-- UPCOMING EVENTS (SAME AS HOME) -->


</div>
<script>
    checkLogin();
</script>

<script src="js/app.js"></script>
</body>
</html>
